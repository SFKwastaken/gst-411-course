<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST 411: Leadership Skills - Course Hub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="courseData.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                <span>GST 411 Hub</span>
            </div>
            <nav>
                <ul class="nav-links" id="chapter-list">
                    <!-- Chapters injected here -->
                </ul>
                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--glass-border);">
                <ul class="nav-links">
                    <li class="nav-item">
                        <a class="nav-link" onclick="app.showFinalExam()">
                            <svg style="margin-right: 8px" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                            Final Exam
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main>
            <div id="welcome-screen" class="section-card">
                <h1 class="title">Welcome to GST 411</h1>
                <p class="content-body" style="font-size: 1.25rem;">
                    Master the art and science of Leadership. Explore the course content, take section quizzes to test your knowledge, and complete the final exam to certify your understanding.
                </p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button class="btn btn-primary" onclick="app.loadChapter(1)">Start Learning</button>
                    <button class="btn btn-outline" onclick="app.showFinalExam()">Take Final Exam</button>
                </div>
            </div>

            <!-- Content Viewer (Dynamic) -->
            <div id="content-viewer" class="section-card" style="display: none;">
                <div id="chapter-content">
                    <h1 id="view-title" class="title"></h1>
                    <div id="view-body" class="content-body"></div>
                    <div style="margin-top: 3rem; pt-2; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                        <button id="start-quiz-btn" class="btn btn-primary">Take Section Quiz (20 Qs)</button>
                    </div>
                </div>

                <!-- Quiz Interface -->
                <div id="quiz-interface" class="quiz-container" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 id="quiz-title">Section Quiz</h2>
                        <span id="quiz-progress" style="color: var(--accent); font-weight: 600;">Question 1/20</span>
                    </div>
                    
                    <div class="question-card">
                        <p id="question-text" style="font-size: 1.2rem; font-weight: 500; margin-bottom: 2rem;"></p>
                        <div id="options-grid" class="options-grid"></div>
                    </div>

                    <div style="display: flex; justify-content: space-between;">
                        <button id="prev-btn" class="btn btn-outline">Previous</button>
                        <button id="next-btn" class="btn btn-primary">Next</button>
                    </div>
                </div>

                <!-- Results Interface -->
                <div id="results-interface" class="results-screen" style="display: none;">
                    <h2 id="result-heading">Quiz Completed!</h2>
                    <div class="score-display">0/20</div>
                    <p id="result-text" style="margin-bottom: 2rem; color: var(--text-muted);"></p>
                    
                    <div id="failed-questions" style="text-align: left; margin-top: 2rem; display: none;">
                        <h3 style="color: var(--error); margin-bottom: 1rem;">Review Incorrect Answers</h3>
                        <div id="failed-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
                    </div>

                    <div style="margin-top: 3rem; display: flex; gap: 1rem; justify-content: center;">
                        <button class="btn btn-primary" id="retake-btn">Retake Course Section</button>
                        <button class="btn btn-outline" onclick="app.loadNextChapter()">Next Chapter</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Background Decoration -->
    <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; pointer-events: none; opacity: 0.4;">
        <div style="position: absolute; width: 400px; height: 400px; background: var(--accent); filter: blur(150px); top: -100px; right: -100px; border-radius: 50%;"></div>
        <div style="position: absolute; width: 300px; height: 300px; background: #4f46e5; filter: blur(120px); bottom: -50px; left: -50px; border-radius: 50%;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
